<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-book me-2"></i>Gestionare Cursuri</h2>
        <a th:href="@{/web/admin/courses/create}" class="btn btn-primary rounded-pill px-4">
            <i class="fa-solid fa-plus me-1"></i> Adaugă Curs Nou
        </a>
    </div>

    <div class="card card-custom p-4 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th scope="col" style="width: 80px;">ID</th>
                        <th scope="col">Titlu</th>
                        <th scope="col">Descriere</th>
                        <th scope="col">Categorie</th>
                        <th scope="col" style="width: 150px;" class="text-center">Opțiuni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${courses.isEmpty()}">
                        <td colspan="5" class="text-center py-4 text-secondary">Nu există cursuri introduse în platformă.</td>
                    </tr>
                    <tr th:each="course : ${courses}">
                        <td class="fw-bold" th:text="${course.id}">1</td>
                        <td>
                            <div class="fw-bold" th:text="${course.title}">Java Basics</div>
                        </td>
                        <td class="text-secondary" th:text="${#strings.abbreviate(course.description, 100)}">Short desc...</td>
                        <td>
                            <span class="badge bg-primary-subtle text-primary" th:text="${course.category.name}">Programming</span>
                        </td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/web/courses/{id}/lessons(id=${course.id})}" 
                                   class="btn btn-info btn-sm px-3 rounded-pill text-white d-inline-flex align-items-center gap-1">
                                    <i class="fa-solid fa-book-open"></i>
                                    <span>Lecții</span>
                                </a>
                                <a th:href="@{/web/admin/courses/edit/{id}(id=${course.id})}" 
                                   class="btn btn-primary btn-sm px-3 rounded-pill text-white d-inline-flex align-items-center gap-1">
                                    <i class="fa-solid fa-pen"></i>
                                    <span>Editează</span>
                                </a>
                                <a th:href="@{/web/admin/courses/delete/{id}(id=${course.id})}" 
                                   class="btn btn-danger btn-sm px-3 rounded-pill text-white d-inline-flex align-items-center gap-1"
                                   onclick="return confirm('Sigur doriți să ștergeți acest curs? Relațiile dependente vor fi afectate.');">
                                    <i class="fa-solid fa-trash"></i>
                                    <span>Șterge</span>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
