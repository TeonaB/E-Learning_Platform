<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
<main>
    <div class="mb-4">
        <h2 class="fw-bold text-primary"><i class="fa-solid fa-book-open me-2"></i>Cursurile Mele</h2>
        <p class="text-secondary small">Explorați cursurile la care v-ați înscris și continuați studiul lecțiilor</p>
    </div>

    <!-- Empty State -->
    <div th:if="${courses.isEmpty()}" class="card card-custom p-5 text-center shadow-sm">
        <div class="py-4">
            <i class="fa-regular fa-folder-open text-muted mb-3" style="font-size: 4rem;"></i>
            <h4 class="text-secondary fw-bold">Nu sunteți înrolat(ă) în niciun curs încă.</h4>
            <p class="text-muted mb-4">Navigați în catalog pentru a descoperi cursurile noastre și a începe învățarea.</p>
            <a th:href="@{/web/home}" class="btn btn-primary rounded-pill px-4">Mergi la Catalog</a>
        </div>
    </div>

    <!-- Enrolled Courses Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" th:if="${!courses.isEmpty()}">
        <div class="col" th:each="course : ${courses}">
            <div class="card h-100 card-custom d-flex flex-column shadow-sm border-0">
                <div class="card-body d-flex flex-column p-4">
                    <span class="badge bg-primary-subtle text-primary mb-2 align-self-start px-3 py-2" 
                          th:text="${course.category.name}">Category</span>
                    <h5 class="card-title fw-bold text-dark mb-3" th:text="${course.title}">Course Title</h5>
                    <p class="card-text text-secondary flex-grow-1 small" 
                       th:text="${#strings.abbreviate(course.description, 120)}">
                        Description...
                    </p>
                    
                    <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                        <a th:href="@{/web/courses/{id}/lessons(id=${course.id})}" 
                           class="btn btn-success rounded-pill px-4 w-100 text-center">
                            <i class="fa-solid fa-circle-play me-2"></i>Continuă Studiul
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
