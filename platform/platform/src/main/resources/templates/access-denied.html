<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::main})}">
<body>
<main class="d-flex align-items-center justify-content-center py-5">
    <div class="card card-custom p-5 shadow-sm text-center" style="max-width: 500px; width: 100%; border: 1px solid #fee2e2; background-color: #fffafb;">
        <div class="mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-danger-subtle text-danger rounded-circle mb-3" style="width: 80px; height: 80px;">
                <i class="fa-solid fa-hand text-danger" style="font-size: 3rem;"></i>
            </div>
            <h2 class="fw-bold text-danger">Acces Interzis (403)</h2>
            <p class="text-secondary mt-2">Nu aveți permisiunile necesare pentru a accesa această pagină administrativă.</p>
        </div>

        <div class="alert alert-warning py-2 mb-4" role="alert" style="font-size: 0.9rem;">
            <i class="fa-solid fa-circle-info me-2"></i>
            Această zonă este rezervată utilizatorilor cu rol de <strong>ADMIN</strong>.
        </div>

        <div class="d-flex justify-content-center gap-2">
            <a th:href="@{/web/home}" class="btn btn-primary rounded-pill px-4">
                <i class="fa-solid fa-house me-1"></i> Înapoi la Catalog
            </a>
        </div>
    </div>
</main>
</body>
</html>
